<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntoFlix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos base para imitar Netflix */
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .text-netflix { color: #E50914; }
        .bg-netflix { background-color: #E50914; }
        
        /* Ocultar barras de desplazamiento para las filas horizontales */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Gradiente para la imagen principal */
        .hero-gradient {
            background: linear-gradient(to top, #141414 0%, rgba(20,20,20,0.4) 50%, transparent 100%);
        }
        
        /* Animaciones */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Ajustes de miniaturas */
        .thumbnail {
            transition: transform 0.2s;
        }
        .thumbnail:active {
            transform: scale(0.95);
        }

        /* Animación de Intro (Netflix) */
        .netflix-intro-zoom {
            transform: scale(1) !important;
            opacity: 1 !important;
            text-shadow: 0 0 50px rgba(229, 9, 20, 0.8);
        }
    </style>
</head>
<body class="antialiased pb-20 overflow-hidden"> <!-- overflow-hidden inicialmente para la intro -->

    <!-- PANTALLA DE INTRODUCCIÓN (Animación + Play Música) -->
    <div id="intro-screen" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <h1 id="intro-logo" class="text-netflix text-5xl md:text-7xl font-bold tracking-widest opacity-0 transform scale-50 transition-all duration-[1500ms] ease-out">ANTOFLIX</h1>
        <button id="start-btn" class="mt-16 text-white border border-gray-600 px-8 py-3 rounded-full font-semibold hover:bg-white hover:text-black transition animate-pulse">
            Toca para empezar ❤️
        </button>
    </div>

    <!-- AUDIO DE FONDO -->
    <!-- NOTA PARA TI: Descarga la canción de Trueno en mp3, ponle el nombre "solo-por-vos.mp3" y guárdala en la misma carpeta que este index.html -->
    <audio id="bg-music" loop>
        <source src="soloporvos.mpeg" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>

    <!-- Navegación Superior -->
    <nav class="fixed top-0 w-full z-40 bg-gradient-to-b from-black/80 to-transparent pt-4 pb-6 px-4 flex justify-between items-center opacity-0 transition-opacity duration-1000" id="main-nav">
        <h1 class="text-netflix text-2xl font-bold tracking-wider">ANTOFLIX</h1>
        <div class="w-8 h-8 rounded bg-gray-600 overflow-hidden border border-gray-400">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Anto" alt="Perfil" class="w-full h-full object-cover">
        </div>
    </nav>

    <!-- Sección Principal (Hero) -->
    <header class="relative h-[70vh] w-full bg-cover bg-center opacity-0 transition-opacity duration-1000" id="main-hero" style="background-image: url('IMG_20240702_220217.jpg');">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="absolute bottom-0 w-full px-4 pb-8 text-center z-10">
            <span class="text-xs font-bold tracking-widest text-gray-300 mb-2 block uppercase">Película Original</span>
            <h2 class="text-5xl font-bold mb-4 font-serif italic text-white shadow-sm">Kiss me more</h2>
            <p class="text-sm text-gray-200 mb-6 px-4 drop-shadow-md">
                Nunca dejes de besarme, porque me solucionas la vida con tus besos.
            </p>
            <div class="flex justify-center gap-4">
                <button onclick="abrirModalPrincipal()" class="bg-white text-black px-6 py-2 rounded font-bold flex items-center gap-2 hover:bg-gray-200 transition">
                    <svg class="w-5 h-5" fill="black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    Reproducir
                </button>
                <button onclick="abrirModalPrincipal()" class="bg-gray-500/70 text-white px-6 py-2 rounded font-bold flex items-center gap-2 hover:bg-gray-500/90 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Info
                </button>
            </div>
        </div>
    </header>

    <!-- Contenedor de Filas -->
    <main class="relative z-20 -mt-4 opacity-0 transition-opacity duration-1000" id="contenedor-filas">
        <!-- Las filas se generarán automáticamente con JavaScript -->
    </main>

    <!-- Modal (Reproductor / Vista de detalles) -->
    <div id="modal" class="fixed inset-0 z-50 bg-black/95 hidden flex-col pt-10 px-4 pb-4 fade-in overflow-y-auto">
        <button onclick="cerrarModal()" class="absolute top-6 right-6 text-white bg-gray-800/80 rounded-full p-2 z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        
        <div id="modal-content" class="w-full max-w-md mx-auto mt-8 flex flex-col gap-4">
            <!-- Aquí se inyectará la foto/video y el texto -->
        </div>
    </div>

    <!-- Menú inferior móvil (Decorativo) -->
    <div class="fixed bottom-0 w-full bg-[#121212]/90 backdrop-blur pb-6 pt-3 px-6 flex justify-around items-center border-t border-gray-800 z-30 opacity-0 transition-opacity duration-1000" id="bottom-nav">
        <div class="flex flex-col items-center text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] mt-1">Inicio</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[10px] mt-1">Nuevos</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[10px] mt-1">Mi Amor</span>
        </div>
    </div>

    <!-- Script de lógica y datos -->
    <script>
        // ==========================================
        // LÓGICA DE INTRODUCCIÓN Y MÚSICA
        // ==========================================
        const introScreen = document.getElementById('intro-screen');
        const introLogo = document.getElementById('intro-logo');
        const startBtn = document.getElementById('start-btn');
        const bgMusic = document.getElementById('bg-music');
        
        // Elementos de la app para mostrarlos después
        const mainNav = document.getElementById('main-nav');
        const mainHero = document.getElementById('main-hero');
        const contFilas = document.getElementById('contenedor-filas');
        const bottomNav = document.getElementById('bottom-nav');

        startBtn.addEventListener('click', () => {
            // 1. Iniciar música ("Solo por vos")
            bgMusic.volume = 0.5; // Volumen al 50%
            bgMusic.play().catch(e => console.log("La reproducción automática falló", e));

            // 2. Ocultar el botón
            startBtn.classList.add('hidden');

            // 3. Animar el logo simulando el inicio de Netflix
            introLogo.classList.remove('scale-50', 'opacity-0');
            introLogo.classList.add('netflix-intro-zoom');

            // 4. Desaparecer la pantalla negra después de la animación
            setTimeout(() => {
                introScreen.classList.add('opacity-0');
                
                // Mostrar la app haciendo fade in
                mainNav.classList.remove('opacity-0');
                mainHero.classList.remove('opacity-0');
                contFilas.classList.remove('opacity-0');
                bottomNav.classList.remove('opacity-0');
                document.body.classList.remove('overflow-hidden');

                setTimeout(() => {
                    introScreen.classList.add('hidden');
                }, 1000); // Espera que termine el fade-out
            }, 3000); // El logo se muestra por 3 segundos
        });

        // ==========================================
        // TUS DATOS (EDITA ESTO)
        // ==========================================

        const datosHero = {
            titulo: "Sos el amor de mi vida",
            mensaje: "Siempre lo digo, pero en serio tiene mucho peso esa frase para mi, porque en serio me veo toda una vida junto a vos.",
            mediaType: "image", 
            url: "IMG_20240619_210445.jpg"
        };

        const categorias = [
            {
                titulo: "Momentos Inolvidables",
                items: [
                    {
                        id: 1,
                        tipo: "image",
                        miniatura: "IMG_20230127_202952.jpg",
                        url: "Foto.jpg",
                        titulo: "Nuestra primera cita",
                        mensaje: "La primera vez que nos vimos en persona, en el parquesito en los jueguitos, estaba re nervioso pero tenia muchas ganas de conocerte."
                    },
                    {
                        // EJEMPLO DE VIDEO (puedes reemplazar la URL por la tuya en mp4)
                        id: 2,
                        tipo: "video",
                        miniatura: "IMG_20260108_012530.jpg",
                        iframe: "https://www.youtube.com/watch?v=1akaPPzau4c",
                        titulo: "Nuestro Amor",
                        mensaje: "A mí me gusta mirar al pasado y ver lo que pasamos juntos, porque eso nos hace lo que somos hoy, y por más que pasamos cosas dificiles, eso me deja más tranquilo, porque nuestra relacion es tan fuerte que puede hasta con lo más dificil"
                    },
                    {
                        id: 3,
                        tipo: "image",
                        miniatura: "IMG_20250430_213505.jpg",
                        url: "IMG_20250430_213505.jpg",
                        titulo: "Ese abrazo",
                        mensaje: "No hay fotos de esa noche, pero que mejor foto que vos devorando dos panchos. la noche del cumpleaños de la Malena en su casa, en donde lo unico que tenia ganas es estar al lado tuyo, el unico motivo de que yo estvuiera ahi eras vos, queria hacer todo con vos y estar lo más cerquita posible, y cuando te bese fue lo segundo mejor que me paso en la vida, porque lo primero fue tocarte el poto, que rico."
                    }
                ]
            },
            {
                titulo: "Por qué te amo (Episodios)",
                items: [
                    {
                        id: 4,
                        tipo: "image",
                        miniatura: "IMG_20260213_230954.jpg",
                        url: "IMG_20260213_230954.jpg",
                        titulo: "Ep. 1: Tu sonrisa",
                        mensaje: "me encanta hacerte sonreir, tambien amo hacerte feliz con lo más minimo, con un helado, pancho, chocolate o lo que sea que quieras, porque una sonrisa tuya vale todo lo que tenga en mi bolsillo."
                    },
                    {
                        id: 5,
                        tipo: "image",
                        miniatura: "IMG_20251202_231407.jpg",
                        url: "IMG_20251202_231407.jpg",
                        titulo: "Ep. 2: Tus ojitos",
                        mensaje: "Tus ojos avellana son los unicos que quiero mirar."
                    },
                    {
                        id: 6,
                        tipo: "image",
                        miniatura: "IMG_20240930_203450.jpg",
                        url: "IMG_20240930_203450.jpg",
                        titulo: "Ep. 3: Nuestra Confianza",
                        mensaje: "Lo que más me gusta de nuestra relacion es nuestra confianza, el punto donde llego nuestra relacion, que bonito es poder confiar en alguien como confio en vos, te amo mucho molto moltito."
                    }
                ]
            }
        ];

        // ==========================================
        // LÓGICA DE LA APLICACIÓN
        // ==========================================

        const contenedorFilas = document.getElementById('contenedor-filas');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        let backgroundAudioWasPlaying = false;

        // Función para renderizar las filas
        function renderizarContenido() {
            categorias.forEach(categoria => {
                const section = document.createElement('section');
                section.className = 'mb-6 px-4';
                
                let html = `<h3 class="text-white font-bold text-lg mb-2">${categoria.titulo}</h3>`;
                html += `<div class="flex gap-3 overflow-x-auto hide-scroll pb-4 pt-1 snap-x">`;
                
                categoria.items.forEach(item => {
                    const itemData = encodeURIComponent(JSON.stringify(item));
                    html += `
                        <div onclick="abrirModal('${itemData}')" class="thumbnail min-w-[140px] w-[140px] h-[200px] bg-gray-800 rounded-md overflow-hidden flex-shrink-0 snap-start relative shadow-lg">
                            <img src="${item.miniatura}" alt="${item.titulo}" class="w-full h-full object-cover">
                            <div class="absolute bottom-0 w-full bg-gradient-to-t from-black/90 to-transparent p-2 pt-6">
                                <p class="text-xs font-bold text-white shadow-sm">${item.titulo}</p>
                            </div>
                            ${item.tipo === 'video' ? '<div class="absolute inset-0 flex items-center justify-center bg-black/20"><svg class="w-10 h-10 text-white/80" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>' : ''}
                        </div>
                    `;
                });
                
                html += `</div>`;
                section.innerHTML = html;
                contenedorFilas.appendChild(section);
            });
        }

        function abrirModal(itemDataString) {
            const item = JSON.parse(decodeURIComponent(itemDataString));
            mostrarContenidoModal(item.tipo, item.url, item.titulo, item.mensaje);
        }

        function abrirModalPrincipal() {
            mostrarContenidoModal(datosHero.mediaType, datosHero.url, datosHero.titulo, datosHero.mensaje);
        }

        function mostrarContenidoModal(tipo, url, titulo, mensaje) {
            let mediaHtml = '';
            
            // Si abre un video, pausamos la música de fondo
            if (tipo === 'video') {
                if (!bgMusic.paused) {
                    backgroundAudioWasPlaying = true;
                    bgMusic.pause();
                }
                // 'playsinline' es vital en iPhone para que no salte a pantalla completa forzosamente
                mediaHtml = `<video src="${url}" controls autoplay playsinline class="w-full rounded-t-lg bg-black"></video>`;
            } else {
                mediaHtml = `<img src="${url}" class="w-full h-64 object-cover rounded-t-lg bg-gray-800" alt="Recuerdo">`;
            }

            modalContent.innerHTML = `
                <div class="bg-[#181818] rounded-lg shadow-2xl mt-4">
                    <div class="relative w-full">
                        ${mediaHtml}
                    </div>
                    <div class="p-6">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-green-500 font-bold text-sm">100% para ti</span>
                            <span class="border border-gray-500 text-gray-300 text-xs px-1 rounded">Apto para enamorados</span>
                        </div>
                        <h2 class="text-2xl font-bold text-white mb-4">${titulo}</h2>
                        <p class="text-gray-300 text-sm leading-relaxed mb-6 font-light">
                            ${mensaje}
                        </p>
                        <button onclick="cerrarModal()" class="w-full bg-white text-black py-3 rounded font-bold hover:bg-gray-200 transition">
                            Cerrar Episodio
                        </button>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function cerrarModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            
            // Reanudamos la música si la pausamos por abrir un video
            if (backgroundAudioWasPlaying) {
                bgMusic.play();
                backgroundAudioWasPlaying = false;
            }

            modalContent.innerHTML = ''; // Limpiar para detener el video
        }

        renderizarContenido();
    </script>
</body>
</html>
